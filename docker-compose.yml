services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./vector-db:/app/vector-db
      - ./logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      API_URL: http://backend:8000/query
      UPLOAD_URL: http://backend:8000/upload
    ports:
      - "8501:8501"
    depends_on:
      - backend